<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Monthly Snapshot - Crackers Cafe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen p-4 md:p-8">

    <div id="app" class="max-w-7xl mx-auto">
        <div id="dashboard">
            <!-- Header -->
            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
                <div>
                    <h1 class="text-3xl font-extrabold tracking-tight">Monthly Snapshot</h1>
                    <p id="reporting-period" class="text-slate-500 font-medium mt-1">Reporting Period: Loading...</p>
                </div>
                <div class="flex gap-2 bg-white p-1 rounded-xl shadow-sm border border-slate-200">
                    <span class="px-4 py-2 bg-slate-900 text-white rounded-lg text-sm font-semibold">Static Report</span>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <!-- Left Side -->
                <div class="lg:col-span-2 space-y-8">
                    <!-- KPI Cards -->
                    <div class="grid grid-cols-1 sm:grid-cols-3 gap-4" id="kpi-container">
                        <!-- KPIs injected by JS -->
                    </div>

                    <!-- Sales Table -->
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
                        <div class="px-6 py-5 border-b border-slate-100">
                            <h2 class="font-bold text-lg">Store Performance</h2>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left">
                                <thead class="bg-slate-50 text-slate-500 text-xs font-bold uppercase">
                                    <tr>
                                        <th class="px-6 py-4">Location</th>
                                        <th class="px-6 py-4 text-right">Sales</th>
                                        <th class="px-6 py-4 text-right">Guests</th>
                                        <th class="px-6 py-4 text-right">Check Avg</th>
                                        <th class="px-6 py-4 text-right">vs Last Mo.</th>
                                        <th class="px-6 py-4 text-right">vs Last Yr.</th>
                                    </tr>
                                </thead>
                                <tbody id="performance-body" class="divide-y divide-slate-100 font-medium text-sm">
                                    <!-- Table rows injected by JS -->
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <!-- Charts Row -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <h2 class="font-bold text-lg mb-6">Sales Trend</h2>
                            <canvas id="salesChart" height="200"></canvas>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <h2 class="font-bold text-lg mb-6">Guest Count Trend</h2>
                            <canvas id="guestChart" height="200"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Right Side -->
                <div class="space-y-8">
                    <div class="bg-slate-900 rounded-3xl p-8 text-white shadow-xl relative overflow-hidden">
                        <div class="relative z-10">
                            <h2 class="text-xl font-bold mb-6">Quick Insights</h2>
                            <div id="insights-content" class="space-y-6">
                                <!-- Insights injected by JS -->
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 text-center">
                        <h2 class="font-bold text-lg mb-4">Sales Mix</h2>
                        <canvas id="mixChart"></canvas>
                        <div id="mix-legend" class="flex justify-between mt-6 px-4">
                            <!-- Legend injected by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ─── UPDATE THIS OBJECT EACH MONTH ───────────────────────────────────────
        const reportData = {
            "month": "March 2026",
            "locations": [
                {
                    "name": "Eastgate",
                    "currentSales": 141579, "prevMoSales": 126235, "prevYrSales": 152431,
                    "currentGuests": 6482, "prevMoGuests": 6181, "prevYrGuests": 7836,
                    "checkAvg": 21.84, "annual2025": 1642595,
                    "salesTrend": [138000, 141000, 135037, 129000, 126235, 141579],
                    "guestTrend": [6800, 7100, 6779, 6300, 6181, 6482]
                },
                {
                    "name": "Greenfield",
                    "currentSales": 192406, "prevMoSales": 176270, "prevYrSales": 212914,
                    "currentGuests": 10622, "prevMoGuests": 8732, "prevYrGuests": 11137,
                    "checkAvg": 18.11, "annual2025": 2065043,
                    "salesTrend": [172000, 175000, 174151, 178000, 176270, 192406],
                    "guestTrend": [8600, 8900, 8733, 8850, 8732, 10622]
                }
            ]
        };
        // ─────────────────────────────────────────────────────────────────────────

        function updateUI(data) {
            document.getElementById('reporting-period').innerText = `Reporting Period: ${data.month}`;

            const totalSales = data.locations.reduce((sum, loc) => sum + loc.currentSales, 0);
            const totalGuests = data.locations.reduce((sum, loc) => sum + loc.currentGuests, 0);
            const totalLYSales = data.locations.reduce((sum, loc) => sum + loc.prevYrSales, 0);
            const yoyVar = ((totalSales - totalLYSales) / totalLYSales * 100).toFixed(1);

            // Update KPIs
            document.getElementById('kpi-container').innerHTML = `
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex justify-between items-start mb-2">
                        <div class="p-3 rounded-xl bg-blue-50 text-blue-600"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
                        <span class="${yoyVar >= 0 ? 'text-emerald-600' : 'text-rose-600'} text-sm font-bold">${yoyVar}%</span>
                    </div>
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-wider">Total Co. Sales</p>
                    <h3 class="text-2xl font-bold mt-1">$${totalSales.toLocaleString()}</h3>
                    <div class="mt-3 pt-3 border-t border-slate-50 space-y-1">
                        ${data.locations.map(loc => `<div class="flex justify-between text-xs font-medium"><span class="text-slate-400">${loc.name}:</span> <span class="text-slate-700">$${(loc.currentSales/1000).toFixed(1)}k</span></div>`).join('')}
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex justify-between items-start mb-2"><div class="p-3 rounded-xl bg-indigo-50 text-indigo-600"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg></div></div>
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-wider">Total Guests</p>
                    <h3 class="text-2xl font-bold mt-1">${totalGuests.toLocaleString()}</h3>
                    <div class="mt-3 pt-3 border-t border-slate-50 space-y-1">
                        ${data.locations.map(loc => `<div class="flex justify-between text-xs font-medium"><span class="text-slate-400">${loc.name}:</span> <span class="text-slate-700">${loc.currentGuests.toLocaleString()}</span></div>`).join('')}
                    </div>
                </div>
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                    <div class="flex justify-between items-start mb-2"><div class="p-3 rounded-xl bg-amber-50 text-amber-600"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></div></div>
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-wider">2025 Annual</p>
                    <h3 class="text-2xl font-bold mt-1">$${(data.locations.reduce((a,b)=>a+b.annual2025,0)/1000000).toFixed(2)}M</h3>
                    <div class="mt-3 pt-3 border-t border-slate-50 space-y-1">
                        ${data.locations.map(loc => `<div class="flex justify-between text-xs font-medium"><span class="text-slate-400">${loc.name}:</span> <span class="text-slate-700">$${(loc.annual2025/1000000).toFixed(2)}M</span></div>`).join('')}
                    </div>
                </div>
            `;

            // Update Table
            document.getElementById('performance-body').innerHTML = data.locations.map(loc => {
                const moVar = ((loc.currentSales - loc.prevMoSales) / loc.prevMoSales * 100).toFixed(1);
                const yrVar = ((loc.currentSales - loc.prevYrSales) / loc.prevYrSales * 100).toFixed(1);
                return `
                    <tr class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 font-bold">${loc.name}</td>
                        <td class="px-6 py-4 text-right">$${loc.currentSales.toLocaleString()}</td>
                        <td class="px-6 py-4 text-right text-slate-500">${loc.currentGuests.toLocaleString()}</td>
                        <td class="px-6 py-4 text-right text-slate-500">$${loc.checkAvg.toFixed(2)}</td>
                        <td class="px-6 py-4 text-right ${moVar >= 0 ? 'text-emerald-600' : 'text-rose-500'}">${moVar >= 0 ? '+' : ''}${moVar}%</td>
                        <td class="px-6 py-4 text-right ${yrVar >= 0 ? 'text-emerald-600' : 'text-rose-600'}">${yrVar >= 0 ? '+' : ''}${yrVar}%</td>
                    </tr>
                `;
            }).join('');

            // Update Insights
            const topVol = [...data.locations].sort((a,b) => b.currentSales - a.currentSales)[0];
            document.getElementById('insights-content').innerHTML = `
                <div>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Highest Volume</p>
                    <p class="text-2xl font-bold">${topVol.name}</p>
                    <div class="w-full bg-white/10 h-1.5 rounded-full mt-2">
                        <div class="bg-blue-400 h-1.5 rounded-full" style="width: ${(topVol.currentSales/totalSales*100).toFixed(0)}%"></div>
                    </div>
                </div>
                <div>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest mb-2">Location Check Averages</p>
                    <div class="space-y-3 mt-3">
                        ${data.locations.map(loc => `
                            <div class="flex justify-between items-center">
                                <span class="text-slate-300 text-sm">${loc.name}</span>
                                <span class="text-xl font-bold text-blue-400">$${loc.checkAvg.toFixed(2)}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            initCharts(data);
        }

        function initCharts(data) {
            const labels = ['M-5', 'M-4', 'M-3', 'M-2', 'M-1', 'Current'];
            const colors = ['#2563eb', '#4f46e5'];

            const commonOptions = {
                responsive: true,
                plugins: { legend: { display: false } },
                scales: {
                    y: { grid: { color: '#f1f5f9' }, ticks: { color: '#94a3b8', font: { size: 10 } } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8', font: { size: 10 } } }
                }
            };

            new Chart(document.getElementById('salesChart'), {
                type: 'line',
                data: {
                    labels,
                    datasets: data.locations.map((loc, i) => ({
                        label: loc.name, data: loc.salesTrend, borderColor: colors[i], tension: 0.4, pointRadius: 3
                    }))
                },
                options: { ...commonOptions, scales: { ...commonOptions.scales, y: { ...commonOptions.scales.y, ticks: { callback: v => '$' + v/1000 + 'k' } } } }
            });

            new Chart(document.getElementById('guestChart'), {
                type: 'line',
                data: {
                    labels,
                    datasets: data.locations.map((loc, i) => ({
                        label: loc.name, data: loc.guestTrend, borderColor: colors[i], borderDash: [5, 5], tension: 0.4, pointRadius: 3
                    }))
                },
                options: commonOptions
            });

            new Chart(document.getElementById('mixChart'), {
                type: 'doughnut',
                data: {
                    labels: data.locations.map(l => l.name),
                    datasets: [{ data: data.locations.map(l => l.currentSales), backgroundColor: colors, borderWidth: 0 }]
                },
                options: { cutout: '75%', plugins: { legend: { display: false } } }
            });

            document.getElementById('mix-legend').innerHTML = data.locations.map((loc, i) => `
                <div class="text-center">
                    <p class="text-xs font-bold text-slate-400 uppercase">${loc.name}</p>
                    <p class="text-lg font-bold" style="color: ${colors[i]}">${(loc.currentSales/data.locations.reduce((a,b)=>a+b.currentSales,0)*100).toFixed(0)}%</p>
                </div>
            `).join('');
        }

        window.onload = () => updateUI(reportData);
    </script>
</body>
</html>
